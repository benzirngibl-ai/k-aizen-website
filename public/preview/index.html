<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>k-AIzen — Eins nach dem anderen.</title>
  <link rel="stylesheet" href="colors_and_type.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--kz-cream);
      overscroll-behavior: none;
    }
    #root { isolation: isolate; }

    @keyframes kz-fade-up {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes kz-scroll-line {
      0%   { transform: scaleY(0); transform-origin: top; }
      40%  { transform: scaleY(1); transform-origin: top; }
      60%  { transform: scaleY(1); transform-origin: bottom; }
      100% { transform: scaleY(0); transform-origin: bottom; }
    }

    /* prevent text selection during cursor play */
    section { user-select: none; -webkit-user-select: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Petal physics (vanilla JS) -->
  <script src="petal-system.js"></script>

  <!-- Tweaks -->
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <!-- Sections (loads after hero so it can reuse hooks) -->
  <script type="text/babel" src="sections.jsx"></script>

  <!-- Hero -->
  <script type="text/babel" src="hero.jsx"></script>
</body>
</html>
